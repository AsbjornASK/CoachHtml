trigger: none
pr: none

schedules:
  - cron: "55 7 * * *"
    displayName: Daily morning coach deploy
    branches:
      include:
        - main
    always: true

pool:
  vmImage: ubuntu-latest

variables:
  NETLIFY_SITE_ID: "e7787410-bd7d-4811-9d23-6df9b5a6d28e"
  MORNING_STATUS_URL: "https://coachhealth.netlify.app/"

steps:
  - checkout: self

  - task: NodeTool@0
    displayName: Use Node.js 22
    inputs:
      versionSpec: "22.x"

  - script: |
      npm install -g netlify-cli @anthropic-ai/claude-code
      netlify --version
      claude --version
    displayName: Install CLIs

  - script: |
      set -euo pipefail
      claude -p "Run the daily MorningAgent workflow now in Azure DevOps pipeline mode. Use MorningAgent.md and CLAUDE.md as the source of truth. Generate today's mobile index.html with real data and create/update the Google Calendar event using MORNING_STATUS_URL. Do not run the final Netlify deploy yourself; the Azure pipeline deploy step runs after Claude exits. Do not use demo data. If a required integration or credential is missing, report the exact blocker and do not invent data or links." \
        --permission-mode bypassPermissions \
        --output-format text
    displayName: Run Claude morning agent
    env:
      ANTHROPIC_API_KEY: $(ANTHROPIC_API_KEY)
      NETLIFY_AUTH_TOKEN: $(NETLIFY_AUTH_TOKEN)
      NETLIFY_SITE_ID: $(NETLIFY_SITE_ID)
      MORNING_STATUS_URL: $(MORNING_STATUS_URL)

  - script: |
      set -euo pipefail
      if [ ! -f index.html ]; then
        echo "index.html was not generated"
        exit 1
      fi
      netlify deploy --prod --dir . --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
    displayName: Deploy to Netlify
    env:
      NETLIFY_AUTH_TOKEN: $(NETLIFY_AUTH_TOKEN)
      NETLIFY_SITE_ID: $(NETLIFY_SITE_ID)
